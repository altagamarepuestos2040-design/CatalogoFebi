<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" width="480" height="180">
  <!-- Fondo negro -->
  <rect width="480" height="180" fill="#0a0a0a" rx="8"/>

  <!-- Silueta/swoosh del auto (curva superior) -->
  <g fill="none" stroke="#CC0000" stroke-width="4" stroke-linecap="round">
    <!-- Curva principal del techo del auto -->
    <path d="M 130 62 Q 160 30 200 28 Q 240 26 270 32 Q 300 38 320 50 Q 340 58 355 62" stroke-width="4.5"/>
    <!-- Línea inferior (piso del auto) -->
    <path d="M 110 75 Q 130 68 180 65 Q 240 62 300 65 Q 340 68 370 75" stroke-width="3.5"/>
    <!-- Rueda delantera insinuada -->
    <path d="M 150 75 Q 145 82 138 82 Q 131 82 126 75" stroke-width="3"/>
    <!-- Rueda trasera insinuada -->
    <path d="M 340 75 Q 335 82 328 82 Q 321 82 316 75" stroke-width="3"/>
    <!-- Parabrisas -->
    <path d="M 190 65 Q 198 48 215 40" stroke-width="2.5" opacity="0.7"/>
    <path d="M 265 38 Q 280 46 290 65" stroke-width="2.5" opacity="0.7"/>
  </g>

  <!-- ALTA GAMA -->
  <text x="240" y="120"
        font-family="Arial Black, Arial, sans-serif"
        font-size="52"
        font-weight="900"
        fill="#CC0000"
        text-anchor="middle"
        letter-spacing="4">ALTA GAMA</text>

  <!-- AUTOPARTES PREMIUM -->
  <text x="240" y="148"
        font-family="Arial, sans-serif"
        font-size="14"
        font-weight="400"
        fill="#CC0000"
        text-anchor="middle"
        letter-spacing="8">AUTOPARTES PREMIUM</text>
</svg>
